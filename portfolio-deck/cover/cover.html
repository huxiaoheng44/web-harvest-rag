<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Web Harvest RAG — Cover</title>
<style>
  :root {
    --accent: #1991e6;
    --accent-dark: #126cac;
    --accent-light: rgba(25, 145, 230, 0.1);
    --bg-sidebar: #f0f7fd;
    --text: #1a2332;
    --muted: #64748b;
    --border: #e1e8f0;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; width: 1920px; height: 1080px; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    background: radial-gradient(circle at 20% 30%, var(--accent-light) 0%, var(--bg-sidebar) 45%, #ffffff 100%);
  }
  .wrap { width: 1920px; height: 1080px; display: flex; align-items: center; padding: 0 100px; }
  .left { flex: none; width: 800px; }
  .badge {
    width: 88px; height: 88px; border-radius: 24px;
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    display: grid; place-items: center; color: white; font-size: 40px; font-weight: 800;
    box-shadow: 0 20px 50px rgba(25,145,230,0.28); margin-bottom: 40px;
  }
  h1 { font-size: 76px; line-height: 1.1; margin: 0 0 28px; color: var(--text); letter-spacing: -0.02em; }
  p.tag-line { font-size: 24px; line-height: 1.6; color: var(--muted); margin: 0 0 40px; max-width: 640px; }
  .tags { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 44px; }
  .tag {
    padding: 8px 16px; border-radius: 999px; background: white; border: 1px solid var(--border);
    color: var(--accent-dark); font-size: 15px; font-weight: 700;
  }
  .stat-row { display: flex; gap: 40px; }
  .stat .num { font-size: 32px; font-weight: 800; color: var(--accent-dark); }
  .stat .label { font-size: 14px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }

  .right { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; }
  .browser-frame {
    width: 940px; border-radius: 16px; overflow: hidden; background: white;
    box-shadow: 0 40px 100px rgba(25,145,230,0.22), 0 10px 30px rgba(0,0,0,0.1);
    transform: rotate(1.2deg);
    border: 1px solid var(--border);
  }
  .browser-chrome {
    height: 40px; background: #eef4fa; display: flex; align-items: center; padding: 0 16px; gap: 8px;
    border-bottom: 1px solid var(--border);
  }
  .dot { width: 11px; height: 11px; border-radius: 50%; background: #d5dee8; }
  .browser-url {
    margin-left: 14px; font-size: 13px; color: var(--muted); background: white; border-radius: 6px;
    padding: 5px 14px; flex: 1; max-width: 320px;
  }
  .shot-crop { width: 940px; overflow: hidden; }
  .shot-crop img { width: 940px; display: block; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="left">
      <div class="badge">W</div>
      <h1>Web Harvest RAG</h1>
      <p class="tag-line">Scrape any site or PDF, retrieve with hybrid vector + keyword search, chat over it — built, benchmarked, and deployed to production.</p>
      <div class="tags">
        <span class="tag">Next.js · FastAPI</span>
        <span class="tag">Supabase pgvector</span>
        <span class="tag">FAISS + BM25</span>
        <span class="tag">Docker + nginx</span>
      </div>
      <div class="stat-row">
        <div class="stat"><div class="num">340</div><div class="label">chunks indexed</div></div>
        <div class="stat"><div class="num">2</div><div class="label">corpora benchmarked</div></div>
        <div class="stat"><div class="num">5</div><div class="label">real bugs fixed</div></div>
      </div>
    </div>
    <div class="right">
      <div class="browser-frame">
        <div class="browser-chrome">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
          <div class="browser-url">webrag.huxiaoheng.com</div>
        </div>
        <div class="shot-crop">
          <img src="../screenshots/chat-conversation.png" alt="Live chat" />
        </div>
      </div>
    </div>
  </div>
</body>
</html>
